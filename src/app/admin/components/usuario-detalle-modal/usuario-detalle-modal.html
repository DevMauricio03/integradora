<app-modal-base ancho="550px" [mostrarCerrar]="true" (close)="close.emit()">
    <div class="modal-content-wrapper" *ngIf="usuario">
        <div class="modal-header">
            <h2>Detalle de Usuario</h2>
        </div>

        <div class="user-profile-head">
            <img [src]="usuario.foto_url || 'https://ui-avatars.com/api/?name=' + usuario.nombre + '&background=random&color=fff'"
                [alt]="usuario.nombre" class="profile-lg">
            <h3>{{ usuario.nombre }} {{ usuario.apellidos }}</h3>
            <p class="role-text">{{ usuario.roles?.nombre || 'Alumno' }}</p>
            <div class="badges-row">
                <app-status-badge text="ACTIVO" type="active"></app-status-badge>
                <div class="custom-badge-verified">VERIFICADO</div>
            </div>
        </div>

        <div class="details-section">
            <div class="detail-item">
                <label>CORREO ELECTRÓNICO</label>
                <p>{{ usuario.correoInstitucional }}</p>
            </div>
            <div class="detail-item">
                <label>UNIVERSIDAD</label>
                <p>{{ usuario.universidades?.acronimo || 'N/A' }}</p>
            </div>
            <div class="detail-item">
                <label>FECHA DE REGISTRO</label>
                <p>{{ formatDate(usuario.creado) }}</p>
            </div>
        </div>

        <!-- 
            Nota: El historial de actividad se deja estático por ahora ya que no hay tabla de logs de actividad 
            en Supabase aún, pero se integra visualmente.
        -->
        <div class="activity-section">
            <label class="section-title">Historial de Actividad</label>
            <div class="activity-list">
                <div class="activity-item">
                    <span class="activity-dot"></span>
                    <div class="activity-text">
                        <p>Inició sesión recientemente</p>
                        <small>Reciente</small>
                    </div>
                </div>
            </div>
        </div>

        <div class="actions-group">
            <button class="action-btn">
                <app-icon name="user-check" [size]="16"></app-icon> Cambiar rol
            </button>
            <button class="action-btn">
                <app-icon name="refresh-cw" [size]="16"></app-icon> Restablecer contraseña
            </button>
            <button class="action-btn danger">
                <app-icon name="ban" [size]="16"></app-icon> Suspender cuenta
            </button>
        </div>

        <div class="modal-footer-actions">
            <button class="btn-cancel" (click)="close.emit()">Cerrar</button>
            <button class="btn-primario">Actualizar información</button>
        </div>
    </div>
</app-modal-base>
