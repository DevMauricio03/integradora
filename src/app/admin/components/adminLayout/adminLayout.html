<app-navbar [showMenu]="true" (onToggleMenu)="toggleMenu()">
    <div navbar-center class="admin-top-title">{{ getTitle() }}</div>
    <div navbar-right class="right-content">
        <div class="admin-profile">
            <img src="https://ui-avatars.com/api/?name=Admin&background=135BEC&color=fff" alt="Admin" class="avatar">
            <div class="admin-info">
                <span class="admin-name">Administrador</span>
                <span class="admin-role">Super Admin</span>
            </div>
        </div>
    </div>
</app-navbar>

<div class="layout">
    @if (isMenuOpen()) {
    <div class="menu-overlay" (click)="toggleMenu()"></div>
    }

    <aside class="sidebar admin-sidebar" [class.open]="isMenuOpen()">
        <div class="sidebar-header-mobile">
            <button class="close-menu-btn" (click)="toggleMenu()">
                <app-icon name="x" [size]="24"></app-icon>
            </button>
        </div>
        <nav>
            <ul>
                <li routerLink="/admin/dashboard" routerLinkActive="active" (click)="toggleMenu()">
                    <app-icon name="home"></app-icon>
                    <span>Inicio</span>
                </li>
                <li routerLink="/admin/users" routerLinkActive="active" (click)="toggleMenu()">
                    <app-icon name="users"></app-icon>
                    <span>Usuarios</span>
                </li>
                <li routerLink="/admin/publications" routerLinkActive="active" (click)="toggleMenu()">
                    <app-icon name="file-text"></app-icon>
                    <span>Publicaciones</span>
                </li>
                <li routerLink="/admin/reports" routerLinkActive="active" (click)="toggleMenu()">
                    <app-icon name="alert-triangle"></app-icon>
                    <span>Reportes</span>
                </li>
                <li class="config-item logout">
                    <button (click)="openLogoutConfirm()" class="logout-btn">
                        <app-icon name="log-out"></app-icon>
                        <span>Cerrar sesión</span>
                    </button>
                </li>
            </ul>
        </nav>
    </aside>

    <main class="contenido admin-contenido">
        <router-outlet></router-outlet>
        <footer class="admin-footer">
            © 2026 Tuunka. Todos los derechos reservados.
        </footer>
    </main>
</div>

@if (showLogoutConfirm()) {
    <app-confirm-modal
        titulo="¿Cerrar sesión?"
        mensaje="Vas a salir del panel de administración. Podrás volver a entrar iniciando sesión otra vez."
        botonConfirmar="Sí, cerrar sesión"
        botonCancelar="Cancelar"
        [esPeligroso]="false"
        (confirm)="logout()"
        (closed)="closeLogoutConfirm()">
    </app-confirm-modal>
}
