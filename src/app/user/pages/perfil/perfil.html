

	<aside>
	</aside>

<main class="contenido">
  <div class="content-wrapper">

		<section class="perfil-header">
			<div class="perfil-info">
				<div class="avatar">
					<img
						[src]="perfil?.foto_url || perfil?.foto_perfil || perfil?.fotoPerfil || defaultAvatarUrl"
						(error)="onAvatarError($event)"
						alt="avatar">
				</div>

				<div class="datos">
					<h1>{{ (perfil?.nombre || 'Usuario') + ' ' + (perfil?.apellidos || '') }}</h1>

					<div class="meta">
						<span class="badge-rol">Estudiante</span>
						<span class="universidad">{{ perfil?.correoInstitucional || 'Sin correo institucional' }}</span>
					</div>
				</div>
			</div>

			<button class="btn-secundario" routerLink="/user/perfil/editar">Editar perfil</button>
		</section>

		<section class="tabs">
			<button class="tab active">Publicaciones</button>
		</section>

		<p class="tabs-descripcion">Mostrando avisos, eventos y ofertas publicadas.</p>

		<section class="lista-publicaciones">
			<div class="card-publicacion">
				<span class="badge tipo-aviso">AVISO</span>
				<h3>Hackathon 2026: Innovación Social</h3>
				<p>Únete a nosotros para 48 horas de código...</p>

				<div class="acciones">
					<button class="btn-primario-sm">Impulsar</button>
					<button class="btn-outline-sm">Editar</button>
					<button class="btn-outline-sm">Eliminar</button>
					<span class="link-compartir">Compartir</span>
				</div>
			</div>
		</section>

		<div class="cargar-mas">
			<button class="btn-outline-sm">Cargar más publicaciones</button>
		</div>
	</div>
	</main>
