<div class="detalle-layout">

  @if (isLoading()) {
  <div class="detalle-loading">
    <p>Cargando experiencia…</p>
  </div>
  } @else if (notFound()) {
  <div class="detalle-not-found">
    <p>No se encontró la experiencia solicitada.</p>
    <button type="button" class="btn-volver-inline" (click)="volver()">← Volver a Experiencias</button>
  </div>
  } @else if (post(); as p) {

  <div class="banner-warning">
    <svg width="20" height="20" fill="none" style="flex-shrink:0"><circle cx="10" cy="10" r="10" fill="#FDE68A"/><path d="M10 6v4m0 4h.01" stroke="#F59E1B" stroke-width="2" stroke-linecap="round"/></svg>
    <span>Esta experiencia refleja únicamente la opinión personal del estudiante.</span>
  </div>

  <app-post-card
    [id]="p.id"
    [author]="p.author"
    [role]="p.role"
    [time]="p.time"
    [title]="p.title"
    [content]="p.description"
    [badge]="p.type"
    [category]="p.category"
    [image]="p.image"
    [images]="p.images"
    [avatar]="p.avatar"
    [details]="p.details"
    [expirationDate]="p.expirationDate"
  />

  <app-comentarios [postId]="p.id" />

  }

</div>
