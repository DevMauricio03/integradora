<main class="feed-container">

  <section class="header-universidad">
    <h1 class="uni-title">Universidad Tecnológica de los Valles Centrales de Oaxaca</h1>
    <div class="uni-status">
      <span class="status-dot"></span>
      <p>Comunidad activa · 12.5k estudiantes y docentes</p>
    </div>
  </section>

  <div class="feed-content">

    @if (posts().length === 0) {
    <div class="empty-state">
      <app-icon name="megaphone" [size]="48"></app-icon>
      <p>No hay publicaciones aún. ¡Sé el primero en compartir algo!</p>
    </div>
    }

    <section class="feed-list">
      @for (post of posts(); track post.id) {
      <app-post-card [author]="post.author || 'Usuario'" [role]="post.role || 'Estudiante'"
        [time]="post.time || 'Ahora'" [title]="post.title" [content]="post.description" [badge]="post.type"
        [image]="post.image" [avatar]="post.avatar" [category]="post.category" [expirationDate]="post.expirationDate" />
      }
    </section>

  </div>

</main>
