<app-navbar [title]="centerTitle() ? '' : title()" [showMenu]="true" (onToggleMenu)="toggleMenu()">

  @if (centerTitle()) {
  <div navbar-center class="user-top-title">
    {{ title() }}
  </div>
  }

  <div navbar-right class="right-content">

    <!-- Buscador móvil -->
    @if (showSearch()) {
    <button class="icon-btn search-mobile-btn" (click)="toggleMobileSearch()">
      <app-icon name="search" [size]="20"></app-icon>
    </button>

    <!-- Buscador desktop -->
    <div class="search-container">
      <app-icon name="search" [size]="18" class="search-icon"></app-icon>
      <input type="text" placeholder="Buscar publicaciones..."
             class="search-input"
             [value]="postStore.searchQuery()"
             (input)="onSearch($event)" />
    </div>
    }

    <!-- Notificación -->
    <button class="icon-btn notification-btn" [routerLink]="['/user/notificaciones']">
      <app-icon name="bell" [size]="20"></app-icon>
      @if (notificationCount() > 0) {
      <span class="notification-badge">{{ notificationCount() }}</span>
      }
    </button>

    @if (showCreateButton()) {
    <button class="btn-nueva-pub" (click)="goToCreate()">
      <app-icon name="plus-circle" [size]="18"></app-icon>
      <span>Nueva Publicación</span>
    </button>
    }
  </div>

</app-navbar>

<!-- Buscador móvil expandido -->
@if (mobileSearchOpen()) {
<div class="mobile-search-bar">
  <app-icon name="search" [size]="18" class="mobile-search-icon"></app-icon>
  <input type="text"
         placeholder="Buscar publicaciones..."
         class="mobile-search-input"
         [value]="postStore.searchQuery()"
         (input)="onSearch($event)"
         autofocus />
  <button class="mobile-search-close" (click)="toggleMobileSearch()">
    <app-icon name="x" [size]="18"></app-icon>
  </button>
</div>
}

<div class="layout">

  <!-- Overlay para cerrar el menú móvil al hacer clic fuera -->
  @if (isMenuOpen()) {
  <div class="menu-overlay" (click)="toggleMenu()"></div>
  }

  <aside class="sidebar" [class.open]="isMenuOpen()">

    <!-- Botón cerrar (X) solo en móvil -->
    <div class="sidebar-header-mobile">
      <button class="close-menu-btn" (click)="toggleMenu()">
        <app-icon name="x" [size]="24"></app-icon>
      </button>
    </div>

    <nav>
      <ul>
        <li routerLink="/user/feed" routerLinkActive="active" (click)="onInicioClick($event)">
          <app-icon name="home"></app-icon>
          <span>Inicio</span>
        </li>

        <li routerLink="/user/experiencias" routerLinkActive="active">
          <app-icon name="briefcase"></app-icon>
          <span>Experiencias<br>Empresariales</span>
        </li>

        <li routerLink="/user/avisos" routerLinkActive="active">
          <app-icon name="megaphone"></app-icon>
          <span>Avisos Oficiales</span>
        </li>

        <li routerLink="/user/perfil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <app-icon name="user"></app-icon>
          <span>Perfil</span>
        </li>

        <li class="config-item" routerLink="/user/configuracion" routerLinkActive="active">
          <app-icon name="settings"></app-icon>
          <span>Configuración</span>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="contenido" #mainScroll>
    <router-outlet></router-outlet>
  </main>

</div>
