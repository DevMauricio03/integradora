<app-navbar [title]="title()">

  <div navbar-right class="right-content">

    <!-- Buscador movido a la derecha -->
    <div class="search-container">
      <app-icon name="search" [size]="18" class="search-icon"></app-icon>
      <input type="text" placeholder="Buscar..." class="search-input" />
    </div>

    <!-- Notificación -->
    <button class="icon-btn">
      <app-icon name="bell" [size]="20"></app-icon>
      <span class="notification-dot"></span>
    </button>

    @if (showCreateButton()) {
    <button class="btn-nueva-pub" (click)="goToCreate()">
      <app-icon name="plus-circle" [size]="18"></app-icon>
      <span>Nueva Publicación</span>
    </button>
    }
  </div>

</app-navbar>

<div class="layout">

  <aside class="sidebar">
    <nav>
      <ul>
        <li routerLink="/user/feed" routerLinkActive="active">
          <app-icon name="home"></app-icon>
          <span>Inicio</span>
        </li>

        <li routerLink="/user/experiencias" routerLinkActive="active">
          <app-icon name="briefcase"></app-icon>
          <span>Experiencias Empresariales</span>
        </li>

        <li>
          <app-icon name="megaphone"></app-icon>
          <span>Avisos Oficiales</span>
        </li>

        <li routerLink="/user/perfil" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <app-icon name="user"></app-icon>
          <span>Perfil</span>
        </li>

        <li class="config-item">
          <app-icon name="settings"></app-icon>
          <span>Configuración</span>
        </li>
      </ul>
    </nav>
  </aside>

  <main class="contenido">
    <router-outlet></router-outlet>
  </main>

</div>
